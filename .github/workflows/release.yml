name: Build e Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências Python
        run: pip install pywebview pythonnet pyinstaller

      - name: Instalar dependências frontend
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build .exe
        run: pyinstaller --noconfirm showdown.spec

      - name: Publicar release com o .exe
        uses: softprops/action-gh-release@v2
        with:
          name: "Versão ${{ github.ref_name }}"
          files: "dist/Showdown Draft.exe"
          generate_release_notes: false
